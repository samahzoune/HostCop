name = "hostcop"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

routes = [
  { pattern = "hostcop.com", custom_domain = true },
  { pattern = "www.hostcop.com", custom_domain = true },
]

# */30 = full sweep + free monitors; */5 = frequent checks for Pro monitors
[triggers]
crons = ["*/5 * * * *", "*/30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "hostcop"
database_id = "6f75f0f9-91c3-42bd-b047-2425efdb3e49"

# Regional probers — one Durable Object per region, placed via locationHint,
# so /speed, /down and monitoring can measure from multiple locations.
[[durable_objects.bindings]]
name = "PROBER"
class_name = "Prober"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Prober"]
